<!DOCTYPE html>
<!-- TEMPLATE-GUIDE — delete this entire comment when generating a page
  development-pattern-guide · TABLE OF CONTENTS PAGE TEMPLATE  (save as index.html)
  ----------------------------------------------------------------------------
  This is the pretty landing page that links to every chapter. Fill placeholders:

    {{SITE_TITLE}}      Short brand name (header + hero)
    {{GUIDE_TITLE}}     Hero heading (HTML allowed: <em> for emphasis)
    {{GUIDE_SUBHEAD}}   Hero subtitle — one line on what the guide teaches
    NOTE: chapter titles in {{TOC_LINKS}} and {{TOC_ENTRIES}} are plain, specific,
          descriptive names in title case (e.g. "Domain Model"), not decorative or
          "artistic" phrasing, and no rendered text on this page may use em-dashes
          (use commas/parentheses instead).
    {{ASSETS}}          Relative path to assets (usually "assets")
    {{TOC_LINKS}}       <li> items for the fly-out panel (same list used on every
                        page). One <li> per chapter:
                            <li><a class="toc-flyout__link" href="01-introduction.html">
                              <span class="num">01</span>
                              <span>Introduction</span></a></li>
    {{TOC_ENTRIES}}     Card entries for the main grid. One per chapter:
                            <li><a class="toc-entry" href="01-introduction.html">
                              <span class="toc-entry__num">01</span>
                              <span class="toc-entry__body">
                                <span class="toc-entry__title">Introduction</span>
                                <span class="toc-entry__sub">What this pattern does at its core.</span>
                              </span>
                              <span class="toc-entry__arrow" aria-hidden="true">→</span>
                            </a></li>
    {{FOOTER_TEXT}}     Colophon line.
  ----------------------------------------------------------------------------
-->
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{SITE_TITLE}} · Contents</title>
  <!-- Apply the saved theme before first paint to avoid a flash of the wrong theme. -->
  <script>
    (function () {
      try {
        if (localStorage.getItem("guide-theme") === "dark") {
          document.documentElement.setAttribute("data-theme", "dark");
        }
      } catch (e) {}
    })();
  </script>
  <link rel="stylesheet" href="{{ASSETS}}/default-global.css">
  <script src="{{ASSETS}}/guide.js" defer></script>
</head>
<body>
  <a class="skip-link" href="#main">Skip to content</a>

  <nav class="toc-flyout" aria-label="Table of contents">
    <button class="toc-flyout__tab" type="button" aria-controls="toc-flyout-panel">Contents</button>
    <div class="toc-flyout__panel" id="toc-flyout-panel">
      <p class="toc-flyout__title">Contents</p>
      <ol class="toc-flyout__list">
        {{TOC_LINKS}}
      </ol>
    </div>
  </nav>

  <header class="site-header">
    <a class="site-brand" href="index.html">
      <span class="site-brand__mark">◆</span>
      <span class="site-brand__name">{{SITE_TITLE}}</span>
    </a>
    <div class="site-header__right">
      <p class="site-header__meta">Pattern Tutorial</p>
      <button class="theme-toggle" type="button" aria-label="Switch to dark theme" aria-pressed="false" title="Toggle light/dark theme">
        <svg class="theme-toggle__moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        <svg class="theme-toggle__sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="4"/><path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M6.34 17.66l-1.41 1.41M19.07 4.93l-1.41 1.41"/></svg>
      </button>
    </div>
  </header>

  <main id="main" class="container">
    <section class="toc-hero">
      <h1>{{GUIDE_TITLE}}</h1>
      <p class="subhead">{{GUIDE_SUBHEAD}}</p>
    </section>

    <ol class="toc-grid">
      {{TOC_ENTRIES}}
    </ol>
  </main>

  <footer class="site-footer">
    <p class="site-footer__colophon">{{FOOTER_TEXT}}</p>
  </footer>
</body>
</html>
